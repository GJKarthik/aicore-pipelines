apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: qwen35-v100-max-throughput
  annotations:
    scenarios.ai.sap.com/description: "Optimized Qwen 3.5 35B MoE for V100"
    scenarios.ai.sap.com/name: "qwen35-v100-max-throughput"
    executables.ai.sap.com/description: "Optimized Qwen 3.5 35B MoE for V100"
    executables.ai.sap.com/name: "qwen35-v100-max-throughput"
  labels:
    scenarios.ai.sap.com/id: "qwen35-v100-max-throughput"
    ai.sap.com/version: "1.0.0"
spec:
  inputs:
    parameters:
      - name: modelName
        default: "Qwen/Qwen3.5-35B-A3B-FP8" 
        type: string
      - name: dataType
        default: "auto"
      - name: gpuMemoryUtilization
        default: "0.92"
      - name: maxTokenLen
        default: "16384"
      - name: maxNumBatchedTokens
        default: "32768"
      - name: maxNumSeqs
        default: "512"
      - name: resourcePlan
        type: "string"
        default: "train.l"
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/target: "1"
      labels: |
        ai.sap.com/resourcePlan: "{{inputs.parameters.resourcePlan}}"
    spec: |
      predictor:
        imagePullSecrets:
        - name: ollamadocker
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: docker.io/gjkarthik/vllm:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          command: ["/bin/sh", "-c"]
          args:
            - >
              set -e && 
              pip install --no-deps --upgrade "transformers>=5.3.0" "huggingface_hub>=0.28.0" &&
              python3 -m vllm.entrypoints.openai.api_server
              --model {{inputs.parameters.modelName}}
              --dtype {{inputs.parameters.dataType}}
              --gpu-memory-utilization {{inputs.parameters.gpuMemoryUtilization}}
              --max-model-len {{inputs.parameters.maxTokenLen}}
              --max-num-batched-tokens {{inputs.parameters.maxNumBatchedTokens}}
              --max-num-seqs {{inputs.parameters.maxNumSeqs}}
              --enable-prefix-caching
              --enable-chunked-prefill
              --reasoning-parser qwen3
              --tensor-parallel-size 1
              --disable-log-requests
              --disable-log-stats
              --language-model-only
          env:
            - name: MODEL
              value: "{{inputs.parameters.modelName}}"
